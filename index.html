<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harborview Realty Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #10241d;       /* deep pine, near-black */
    --pine: #1c3c2f;      /* primary surface green */
    --brass: #b8945f;     /* warm brass accent */
    --brass-light: #d4b98a;
    --cream: #faf7f1;     /* page / bot bubble base */
    --sand: #efe8da;      /* bot bubble */
    --ink-soft: #4a5a52;  /* secondary text */
    --line: rgba(16,36,29,0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--cream);
  }

  /* ---- Demo page content (replace with your real site) ---- */
  .page-content {
    max-width: 640px;
    margin: 100px auto;
    padding: 0 24px;
    text-align: center;
    color: var(--ink);
  }
  .page-content .eyebrow {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--brass);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .page-content h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 2.6rem;
    letter-spacing: -0.01em;
    margin: 0 0 12px;
  }
  .page-content p { color: var(--ink-soft); font-size: 1rem; line-height: 1.6; }

  /* ---- Chat launcher: monogram badge, not a generic bubble icon ---- */
  #chat-launcher {
    position: fixed;
    bottom: 26px;
    right: 26px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--pine);
    border: 1px solid rgba(184,148,95,0.35);
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(16,36,29,0.28);
    z-index: 9999;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #chat-launcher:hover {
    transform: scale(1.05);
    box-shadow: 0 14px 34px rgba(16,36,29,0.34);
  }
  #chat-launcher .mono {
    font-family: 'Fraunces', serif;
    color: var(--brass-light);
    font-size: 22px;
    font-weight: 500;
  }

  /* ---- Chat window ---- */
  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 26px;
    width: 360px;
    max-width: calc(100vw - 32px);
    height: 480px;
    max-height: calc(100vh - 150px);
    background: var(--cream);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(16,36,29,0.28);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    border: 1px solid var(--line);
  }
  #chat-window.open {
    display: flex;
    animation: rise 0.22s ease;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #chat-header {
    background: var(--pine);
    color: white;
    padding: 18px 20px 16px;
    position: relative;
  }
  #chat-header .brand {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  #chat-header .sub {
    display: block;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 11.5px;
    color: rgba(255,255,255,0.65);
    margin-top: 3px;
  }
  #chat-header .rule {
    height: 1px;
    background: linear-gradient(90deg, var(--brass) 0%, rgba(184,148,95,0) 70%);
    margin-top: 12px;
  }
  #chat-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
  }
  #chat-close:hover { color: white; }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .msg {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 13px;
    font-size: 13.5px;
    line-height: 1.5;
  }
  .msg.bot {
    background: var(--sand);
    color: var(--ink);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    background: var(--pine);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.typing {
    background: var(--sand);
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 13px 15px;
  }
  .msg.typing span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--ink-soft);
    opacity: 0.5;
    animation: pulse 1.1s infinite ease-in-out;
  }
  .msg.typing span:nth-child(2) { animation-delay: 0.15s; }
  .msg.typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.35; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  #chat-input-row {
    display: flex;
    border-top: 1px solid var(--line);
    padding: 10px;
    gap: 8px;
    background: var(--cream);
  }
  #chat-input {
    flex: 1;
    border: 1px solid var(--line);
    background: white;
    border-radius: 22px;
    padding: 10px 15px;
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    outline: none;
    color: var(--ink);
  }
  #chat-input:focus { border-color: var(--brass); }
  #chat-input::placeholder { color: #9aa79f; }
  #chat-send {
    background: var(--pine);
    color: var(--brass-light);
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  #chat-send:hover:not(:disabled) { background: var(--ink); }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

  <!-- Replace this with your real Harborview landing page content -->
  <div class="page-content">
    <div class="eyebrow">Harborview Realty Group</div>
    <h1>Austin real estate,<br>handled personally.</h1>
    <p>Whether you're buying or selling, our concierge assistant<br>
    is ready in the corner — click to begin.</p>
  </div>

  <!-- Chat widget -->
  <button id="chat-launcher" aria-label="Open chat"><span class="mono">H</span></button>

  <div id="chat-window">
    <div id="chat-header">
      <div class="brand">Harborview Concierge</div>
      <span class="sub">Austin, TX · Buy &amp; Sell</span>
      <div class="rule"></div>
      <button id="chat-close" aria-label="Close chat">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Type a message..." />
      <button id="chat-send">➤</button>
    </div>
  </div>

<script>
  // ---- CONFIG ----
  // Point this at your deployed Vercel backend URL once live, e.g.
  // const API_URL = "https://your-project.vercel.app/api/chat";
  const API_URL = "/api/chat";

  const launcher = document.getElementById('chat-launcher');
  const chatWindow = document.getElementById('chat-window');
  const closeBtn = document.getElementById('chat-close');
  const messagesEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');

  let conversation = []; // holds {role, content} pairs sent to the API
  let hasGreeted = false;

  launcher.addEventListener('click', () => {
    chatWindow.classList.toggle('open');
    if (!hasGreeted) {
      hasGreeted = true;
      const greeting = "Welcome to Harborview. I'm here to help — are you looking to buy or sell a home in Austin?";
      addMessage('bot', greeting);
      conversation.push({ role: 'assistant', content: greeting });
    }
  });

  closeBtn.addEventListener('click', () => {
    chatWindow.classList.remove('open');
  });

  function addMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addMessage('user', text);
    conversation.push({ role: 'user', content: text });
    inputEl.value = '';
    sendBtn.disabled = true;

    const typingEl = document.createElement('div');
    typingEl.className = 'msg typing';
    typingEl.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversation }),
      });

      const data = await res.json();
      typingEl.remove();

      if (data.reply) {
        addMessage('bot', data.reply);
        conversation.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('bot', "Sorry, something went wrong. Please try again.");
      }
    } catch (err) {
      typingEl.remove();
      addMessage('bot', "Sorry, I'm having trouble connecting. Please try again shortly.");
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
